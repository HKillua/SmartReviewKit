# Modular RAG MCP Server - Configuration
# This is the main configuration file for the MCP Server.
# Edit this file to configure LLM, Embedding, VectorStore, and other services.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "zhipu"  # Options: openai, azure, ollama, deepseek, zhipu
  model: "glm-4-flash"
  api_key: "8d4c63adb3674b0d8cb6f93e30ee7625.khqdn2kakxI1Vntd"
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  temperature: 0.7
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "zhipu"  # Options: openai, azure, ollama, zhipu
  model: "embedding-3"
  dimensions: 2048  # embedding-3 supports 256/512/1024/2048, default 2048
  api_key: "8d4c63adb3674b0d8cb6f93e30ee7625.khqdn2kakxI1Vntd"
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  # Ollama settings (if provider is ollama):
  # model: "nomic-embed-text"
  # dimensions: 768

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true
  provider: "zhipu"  # Options: openai, azure, zhipu, ollama
  model: "glm-4v-flash"  # ZhiPu free vision model
  api_key: "8d4c63adb3674b0d8cb6f93e30ee7625.khqdn2kakxI1Vntd"
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  max_image_size: 2048

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"  # Options: chroma, milvus
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"
  hnsw:
    space: "cosine"
    M: 32
    construction_ef: 200
    search_ef: 100
  milvus:
    uri: "./data/db/milvus.db"
    dim: 768

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60  # RRF constant

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: false
  provider: "none"  # Options: none, cross_encoder, llm
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  provider: "custom"  # Options: ragas, deepeval, custom
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "structure"  # Options: recursive, semantic, structure
  batch_size: 20

  chunk_refiner:
    use_llm: false
    parent_child_enabled: true
    parent_chunk_size: 2400
    parent_chunk_overlap: 200
    semantic_splitter:
      similarity_threshold: 0.5
      min_chunk_size: 100
      max_chunk_size: 1500

  metadata_enricher:
    use_llm: false

# =============================================================================
# Agent Configuration
# =============================================================================
agent:
  max_tool_iterations: 10
  stream_responses: true
  tool_timeout: 30
  max_context_messages: 40
  max_context_tokens: 8000
  temperature: 0.7
  system_prompt_path: "config/prompts/system_prompt.txt"
  skills_dir: "src/agent/skills/definitions"
  memory_enabled: true
  conversation_store_dir: "data/conversations"
  default_collection: "computer_network"
  auto_ingest_dir: "docs/computer_internet"  # startup auto-ingest directory

# =============================================================================
# Server Configuration
# =============================================================================
server:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]
  max_upload_size_mb: 50
  upload_dir: "data/uploads"

# =============================================================================
# Memory Configuration
# =============================================================================
memory:
  enabled: true
  db_dir: "data/memory"
  profile_enabled: true
  error_memory_enabled: true
  knowledge_map_enabled: true
  skill_memory_enabled: true
  session_memory_enabled: true
  decay_interval_hours: 24
  extraction_mode: "both"        # llm / rule / both (LLM优先，失败回退rule)
  review_schedule_enabled: true  # 启用主动复习推荐
  decay_on_session_start: true   # 新会话开始时触发 Ebbinghaus 衰减
  compaction_enabled: true       # 启用上下文压缩 (CoPaw-style Compaction)
  compaction_threshold_messages: 30  # 超过此消息数时触发压缩
